name: Caretaker

on:
  schedule:
    - cron: "0 8 * * *"
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options: [full, pr-only, issue-only, upgrade, devops, security, deps, docs, charlie, stale, escalation, self-heal, dry-run]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

env:
  # Broad throttle for bursty webhook-triggered caretaker executions.
  EVENT_COOLDOWN_MINUTES: "3"
  # Additional stricter throttle for issue_comment-triggered runs.
  ISSUE_COMMENT_COOLDOWN_MINUTES: "5"

# Concurrency strategy:
#
# For ``pull_request`` events a new commit makes the prior run obsolete, so we
# cancel the older run. For every other event class — ``issue_comment``,
# ``check_suite``, ``schedule``, etc. — each event carries fresh signal that
# the in-progress run hasn't seen yet, so cancellation just loses work. We
# let those serialize via the dispatch-guard cooldown instead.
concurrency:
  group: caretaker-${{ github.event.pull_request.number || github.event.check_suite.head_branch || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dispatch-guard:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.guard.outputs.should_run }}
      reason: ${{ steps.guard.outputs.reason }}
    steps:
      - name: Decide whether this event should run caretaker
        id: guard
        uses: actions/github-script@v7
        with:
          script: |
            const eventName = context.eventName;
            const payload = context.payload || {};

            const pass = (reason) => {
              core.setOutput("should_run", "true");
              core.setOutput("reason", reason);
              core.info(`Dispatch guard: pass — ${reason}`);
            };

            const skip = (reason) => {
              core.setOutput("should_run", "false");
              core.setOutput("reason", reason);
              core.notice(`Dispatch guard: skip — ${reason}`);
            };

            // Never throttle explicit operator-triggered runs.
            if (eventName === "schedule" || eventName === "workflow_dispatch") {
              pass(`event=${eventName} is exempt from cooldown guard`);
              return;
            }

            // Issue comments need extra filtering to avoid chatter storms and self loops.
            if (eventName === "issue_comment") {
              const actor = payload.comment?.user?.login || context.actor || "unknown";
              const rawBody = payload.comment?.body || "";
              const body = rawBody.toLowerCase();

              // Skip any caretaker-marker comment regardless of who authored it.
              if (/<!--\s*caretaker:[a-z0-9:_-]+/i.test(rawBody)) {
                skip("issue_comment carries caretaker marker (self-trigger loop guard)");
                return;
              }

              // Ignore bot-authored comments to avoid self-trigger loops.
              const botActors = new Set([
                "the-care-taker[bot]",
                "github-actions[bot]",
                "copilot-swe-agent[bot]",
                "anthropic-code-agent[bot]",
                "copilot-pull-request-reviewer[bot]",
              ]);
              if (botActors.has(actor)) {
                skip(`bot-authored issue_comment from ${actor}`);
                return;
              }

              // Only run on explicit maintainer commands / mentions.
              const hasExplicitCommand =
                body.includes("@the-care-taker") ||
                body.includes("/caretaker") ||
                body.includes("/maintain");

              if (!hasExplicitCommand) {
                skip("issue_comment missing explicit maintainer command/mention");
                return;
              }
            }

            // Reviews submitted by the Copilot reviewer bot are not human signals.
            if (eventName === "pull_request_review") {
              const reviewer = payload.review?.user?.login || "";
              if (reviewer === "copilot-pull-request-reviewer[bot]") {
                skip(`pull_request_review by ${reviewer} (bot reviewer; not a human signal)`);
                return;
              }
            }

            const hotEvents = new Set([
              "issue_comment",
              "issues",
              "pull_request",
              "pull_request_review",
              "check_suite",
              "workflow_run",
            ]);

            if (!hotEvents.has(eventName)) {
              pass(`event=${eventName} not in cooldown-managed event set`);
              return;
            }

            const cooldownEnv =
              eventName === "issue_comment"
                ? "ISSUE_COMMENT_COOLDOWN_MINUTES"
                : "EVENT_COOLDOWN_MINUTES";
            const defaultCooldown = eventName === "issue_comment" ? 5 : 3;
            const cooldownMinutes = Number(process.env[cooldownEnv] || String(defaultCooldown));
            const effectiveCooldown =
              Number.isFinite(cooldownMinutes) && cooldownMinutes >= 0
                ? cooldownMinutes
                : defaultCooldown;

            const activeStatuses = new Set(["queued", "in_progress", "pending", "requested", "waiting"]);
            const now = Date.now();

            const targetBranch =
              payload.pull_request?.head?.ref ||
              payload.check_suite?.head_branch ||
              payload.workflow_run?.head_branch ||
              null;

            const { data } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "maintainer.yml",
              event: eventName,
              per_page: 20,
            });

            const blockingRun = (data.workflow_runs || []).find((run) => {
              if (run.id === context.runId) {
                return false;
              }

              if (targetBranch && run.head_branch && run.head_branch !== targetBranch) {
                return false;
              }

              if (activeStatuses.has(run.status)) {
                return true;
              }

              const referenceTs = Date.parse(run.updated_at || run.created_at || "");
              if (!Number.isFinite(referenceTs)) {
                return false;
              }
              const ageMinutes = (now - referenceTs) / 60000;
              return ageMinutes < effectiveCooldown;
            });

            if (blockingRun) {
              skip(
                `cooldown active (${effectiveCooldown}m): run #${blockingRun.id} is ${blockingRun.status}` +
                  (targetBranch ? ` on ${targetBranch}` : ""),
              );
              return;
            }

            pass(`${eventName} accepted and cooldown window clear`);

      - name: Guard result
        run: |
          echo "should_run=${{ steps.guard.outputs.should_run }}"
          echo "reason=${{ steps.guard.outputs.reason }}"

  maintain:
    needs: dispatch-guard
    if: ${{ needs.dispatch-guard.outputs.should_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore memory store cache
        uses: actions/cache@v4
        with:
          path: .caretaker-memory.db
          key: caretaker-memory-${{ github.repository }}
          restore-keys: |
            caretaker-memory-

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker-github @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"
          pip install "litellm>=1.50,<2"

      - name: Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT for a real write-capable user or machine user.
          # Caretaker uses this for Copilot issue assignment and @copilot comments
          # that must not be authored as github-actions[bot].
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          CARETAKER_RUN_MODE: ${{ github.event.inputs.mode || 'full' }}
          CARETAKER_EVENT_TYPE: ${{ github.event_name }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode "$CARETAKER_RUN_MODE" \
            --event-type "$CARETAKER_EVENT_TYPE" \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"

      # Upload a JSON snapshot of the memory store so it can be downloaded for
      # auditing or used to manually restore a known-good state.
      - name: Upload memory store snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: caretaker-memory-snapshot-${{ github.run_number }}
          path: .caretaker-memory-snapshot.json
          if-no-files-found: ignore
          # Dotfiles are excluded by default in upload-artifact v4 — must
          # set include-hidden-files: true so .caretaker-memory-snapshot.json
          # is actually captured.
          include-hidden-files: true
          retention-days: 30

  # When the caretaker run itself fails, trigger the self-heal agent
  self-heal-on-failure:
    runs-on: ubuntu-latest
    needs: [dispatch-guard, maintain]
    if: ${{ needs.dispatch-guard.outputs.should_run == 'true' && failure() }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker-github @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"

      - name: Self-heal — analyse own failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fine-grained PAT for a real write-capable user or machine user.
          COPILOT_PAT: ${{ secrets.COPILOT_PAT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_FAILED_RUN_ID: ${{ github.run_id }}
          CARETAKER_EVENT_PAYLOAD: >-
            {
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "Caretaker",
                "conclusion": "failure",
                "head_branch": "${{ github.ref_name }}"
              }
            }
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode self-heal \
            --event-type workflow_run \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"
